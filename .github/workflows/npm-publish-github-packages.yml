## 📌 Check package.json

Confirm that your `package.json` file contains these fields:

```json
{
"name": "@pasindudananjaya92-bot/bhook-",
"version": "1.0.0",
"publishConfig": {
"registry": "https://npm.pkg.github.com/"
}
}
```

> ⚠️ Confirm that the `name` field includes **scope** (`@pasindudananjaya92-bot/`). Otherwise, the publish will fail!

