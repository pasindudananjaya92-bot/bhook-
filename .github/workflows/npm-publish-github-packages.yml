## ✅ Fixed GitHub Actions Workflow YAML

> 📋 **Copy and paste into `.github/workflows/npm-publish-github-packages.yml` file:**

```yaml
name: Node.js Package

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build (optional - if there is a build script in package.json)
        run: npm run build --if-present

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
with:
node-version: '22'
registry-url: 'https://npm.pkg.github.com/'
scope: '@pasindudananjaya92-bot'

- name: Install dependencies
run: npm ci

- name: Publish to GitHub Packages
run: npm publish
env:
NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

